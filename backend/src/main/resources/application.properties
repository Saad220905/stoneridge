# Spring Boot Application Properties

# Server Port
server.port=8000

# Spring Data JPA and Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Database Connection (replace with your actual credentials and database name)
spring.datasource.url=jdbc:postgresql://localhost:5432/stoneridge_db
spring.datasource.username=stoneridge_user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Plaid API Configuration
plaid.client_id=your_plaid_client_id
plaid.secret=your_plaid_secret
plaid.env=sandbox

# Dwolla API Configuration
dwolla.key=your_dwolla_key
dwolla.secret=your_dwolla_secret
dwolla.env=sandbox

# JWT Secret (for Spring Security)
jwt.secret=your_very_long_and_secure_jwt_secret_key_that_is_at_least_256_bits_or_32_bytes_long

# CORS Configuration (adjust as needed for frontend origin)
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
